_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: Clint SLA Alerts
  description: Envia alertas diarios de SLA comercial via n8n.
  background_color: "#0A2540"

features:
  bot_user:
    display_name: Clint SLA Bot
    always_online: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - channels:read
      - groups:read
      - im:read
      - mpim:read

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  event_subscriptions:
    bot_events: []
  interactivity:
    is_enabled: false
  incoming_webhooks:
    incoming_webhooks_enabled: false
